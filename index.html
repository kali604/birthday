<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta property="og:title" content="Our Story 💕" />
  <meta property="og:description" content="A choose-your-own-adventure love story" />
  <meta property="og:type" content="website" />
  <title>Our Story</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Lora', serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #fdf6f0;
      transition: background-color 0.8s ease;
      overflow-x: hidden;
      padding: 1rem;
    }

    #app {
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    #app.hidden {
      display: none;
    }

    /* Cover page */
    #cover {
      max-width: 520px;
      width: 100%;
      text-align: center;
      animation: fadeInUp 0.8s forwards;
    }

    #cover.hidden {
      display: none;
    }

    #cover h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      color: #4a3728;
      margin-bottom: 0.5rem;
    }

    #cover .dedication {
      font-size: 1.1rem;
      color: #8a7060;
      margin-bottom: 2.5rem;
      font-style: italic;
    }

    #cover .cover-buttons {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
    }

    .cover-btn {
      font-family: 'Lora', serif;
      font-size: 1.1rem;
      padding: 1rem 2.2rem;
      border: 2px solid #e8a0bf;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 2rem;
      cursor: pointer;
      color: #5c3a5e;
      transition: all 0.3s ease;
      backdrop-filter: blur(4px);
      min-width: 240px;
    }

    .cover-btn:hover {
      background: #e8a0bf;
      color: #fff;
      transform: scale(1.04);
      box-shadow: 0 4px 16px rgba(232, 160, 191, 0.4);
    }

    .cover-btn:active {
      transform: scale(0.97);
    }

    #story-title {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: #4a3728;
      margin-bottom: 2rem;
      opacity: 0.9;
    }

    #story-container {
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    #story-container.visible {
      opacity: 1;
      transform: translateY(0);
    }

    #scene-emoji {
      font-size: 3rem;
      margin-bottom: 1.2rem;
      display: block;
      animation: float 3s ease-in-out infinite;
    }

    #scene-text {
      font-size: 1.15rem;
      line-height: 1.8;
      color: #3d2e22;
      margin-bottom: 2rem;
      min-height: 80px;
      white-space: pre-line;
    }

    #choices {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      align-items: center;
    }

    .choice-btn {
      font-family: 'Lora', serif;
      font-size: 1rem;
      padding: 0.85rem 1.8rem;
      border: 2px solid #e8a0bf;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 2rem;
      cursor: pointer;
      color: #5c3a5e;
      transition: all 0.3s ease;
      opacity: 0;
      animation: fadeInUp 0.5s forwards;
      backdrop-filter: blur(4px);
      max-width: 100%;
      white-space: pre-line;
    }

    .choice-btn:hover {
      background: #e8a0bf;
      color: #fff;
      transform: scale(1.04);
      box-shadow: 0 4px 16px rgba(232, 160, 191, 0.4);
    }

    .choice-btn:active {
      transform: scale(0.97);
    }

    #restart-btn {
      font-family: 'Lora', serif;
      font-size: 0.9rem;
      padding: 0.7rem 1.5rem;
      border: 1px solid #ccc;
      background: transparent;
      border-radius: 2rem;
      cursor: pointer;
      color: #888;
      margin-top: 2rem;
      transition: all 0.3s ease;
    }

    #restart-btn:hover {
      border-color: #e8a0bf;
      color: #5c3a5e;
    }

    #restart-btn.hidden {
      display: none;
    }

    #post-credits-btn {
      font-family: 'Lora', serif;
      font-size: 0.9rem;
      padding: 0.7rem 1.5rem;
      border: 1px solid #ccc;
      background: transparent;
      border-radius: 2rem;
      cursor: pointer;
      color: #888;
      margin-top: 0.75rem;
      transition: all 0.3s ease;
    }

    #post-credits-btn:hover {
      border-color: #5c3a5e;
      color: #5c3a5e;
    }

    #post-credits-btn.hidden {
      display: none;
    }

    /* Animations */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Floating hearts */
    .floating-heart {
      position: fixed;
      bottom: -40px;
      animation: riseUp linear forwards;
      pointer-events: none;
      z-index: 1000;
    }

    @keyframes riseUp {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(-110vh) rotate(30deg);
        opacity: 0;
      }
    }

    /* Confetti */
    .confetti {
      position: fixed;
      top: -10px;
      width: 8px;
      height: 16px;
      border-radius: 2px;
      animation: confettiFall linear forwards;
      pointer-events: none;
      z-index: 1000;
    }

    @keyframes confettiFall {
      0% {
        transform: translateY(0) rotateZ(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(110vh) rotateZ(720deg);
        opacity: 0;
      }
    }

    /* Music toggle */
    #music-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      background: rgba(255,255,255,0.8);
      border: 2px solid #e8a0bf;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      font-size: 1.2rem;
      cursor: pointer;
      z-index: 999;
      transition: all 0.3s ease;
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #music-toggle:hover {
      background: #e8a0bf;
      color: #fff;
      transform: scale(1.1);
    }

    #back-btn {
      position: fixed;
      top: 1rem;
      left: 1rem;
      background: rgba(255,255,255,0.8);
      border: 2px solid #e8a0bf;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      font-size: 1.2rem;
      cursor: pointer;
      z-index: 999;
      transition: all 0.3s ease;
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #5c3a5e;
    }

    #back-btn:hover {
      background: #e8a0bf;
      color: #fff;
      transform: scale(1.1);
    }

    #back-btn.hidden {
      display: none;
    }

    /* Mobile adjustments */
    @media (max-width: 480px) {
      #story-title {
        font-size: 1.6rem;
      }
      #scene-text {
        font-size: 1.05rem;
      }
      #scene-emoji {
        font-size: 2.5rem;
      }
    }
  </style>
</head>
<body>
  <button id="music-toggle" title="Toggle music">🔇</button>
  <button id="back-btn" class="hidden" title="Go back">←</button>
  <audio id="bg-music" loop preload="auto" src="music.mp3"></audio>
  <audio id="arab-music" loop preload="auto" src="arab_music.mp3"></audio>

  <div id="cover">
    <h1>Our Story 💕</h1>
    <p class="dedication">Happy Birthday, Anika</p>
    <div class="cover-buttons">
      <button id="cover-main" class="cover-btn">Play Our Story 💕</button>
      <button id="cover-dorito" class="cover-btn">Play as Dorito 🐱</button>
    </div>
  </div>

  <div id="app" class="hidden">
    <h1 id="story-title"></h1>
    <div id="story-container">
      <span id="scene-emoji"></span>
      <p id="scene-text"></p>
      <div id="choices"></div>
      <button id="restart-btn" class="hidden">Read our story again ↺</button>
      <button id="post-credits-btn" class="hidden">Post-credits 🎬</button>
    </div>
  </div>
  <script src="app.js?v=5"></script>
</body>
</html>
